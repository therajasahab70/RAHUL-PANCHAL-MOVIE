<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHUL PANCHAL MOVIE WEBSITE 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #141414; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .header-top { display: flex; align-items: center; justify-content: flex-start; gap: 20px; }
        .profile-pic { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #e50914; box-shadow: 0 0 15px rgba(229, 9, 20, 0.6); }
        .yt-logo { display: flex; align-items: center; font-family: 'Oswald', 'Arial Black', sans-serif; font-size: 2.2rem; font-weight: bold; letter-spacing: -1px; }
        .yt-logo .white-text { color: #ffffff; }
        .yt-logo .red-box { background-color: #ff0000; color: #ffffff; padding: 2px 10px; border-radius: 8px; margin-left: 6px; font-weight: 900; }
        .stats { font-size: 1.1rem; color: #aaa; margin-top: 15px; background: #222; display: inline-block; padding: 6px 15px; border-radius: 20px; border: 1px solid #444; }
        .stats span { color: #ff0000; font-weight: bold; font-size: 1.2rem; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .movie-card { background: #1f1f1f; border-radius: 8px; padding: 15px; border: 1px solid #333; display: flex; flex-direction: column; }
        .movie-poster { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; background: #000; }
        iframe { width: 100%; height: 220px; border: none; background: #000; border-radius: 4px; margin-bottom: 10px; }
        .movie-title { font-size: 1.1rem; margin: 5px 0 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: bold; color: #00ff66; }
        .download-btn { display: block; background: #e50914; color: white; padding: 10px; text-decoration: none; border-radius: 4px; font-weight: bold; text-align: center; margin-top: auto; }
        .download-btn:hover { background: #b81d24; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <img src="https://i.ibb.co/275W16L4/Picsart-26-06-12-10-45-51-459.jpg" alt="Profile" class="profile-pic">
                <div class="yt-logo">
                    <span class="white-text">RAHUL PANCHAL</span>
                    <span class="red-box">MOVIE</span>
                </div>
            </div>
            <div class="stats">📊 Total Movies On Website: <span id="movie-count">0</span></div>
        </header>

        <h2>Available Movies</h2>
        <div class="movie-grid" id="movieGrid"></div>
    </div>

    <script>
        async function loadMovies() {
            try {
                const res = await fetch('/api/movies');
                const data = await res.json();
                document.getElementById('movie-count').innerText = data.totalMovies || 0;
                const movieGrid = document.getElementById('movieGrid');
                movieGrid.innerHTML = '';

                if(!data.movies || data.movies.length === 0) {
                    movieGrid.innerHTML = '<p style="color: #666;">No movies available right now.</p>';
                    return;
                }

                data.movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    const posterHtml = movie.posterUrl ? `<img src="${movie.posterUrl}" alt="${movie.title}" class="movie-poster">` : '';

                    card.innerHTML = `
                        ${posterHtml}
                        <iframe src="${movie.videoUrl}" allow="autoplay" allowfullscreen></iframe>
                        <div class="movie-title">${movie.title}</div>
                        <a href="${movie.downloadUrl}" class="download-btn" target="_blank">📥 Download</a>
                    `;
                    movieGrid.appendChild(card);
                });
            } catch (err) { console.error(err); }
        }
        window.onload = loadMovies;
    </script>
</body>
</html>
